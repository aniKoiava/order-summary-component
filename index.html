<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css">
    <title>Homework 4</title>
</head>
<body>
    <header>
        <div class="wave">
            <img src="img/Path 2.png" alt="header">
        </div>
    </header>
    <main>
        <div class="main-container">
    
            <div class="blue-box">
                <div class="dots"></div>
                <div class="dots1"></div>
                <div class="dots2"></div>
                <div class="dots3"></div>
                <div class="dots4"></div>

                <div class="human">
                    <img src="img/Music_Flatline 2.png" alt="" class="girl">
                </div>


            </div>

                


             <h1>Order Summary</h1>
            <div class="text">
                <p class="sum">You can now listen to millions of songs, audiobooks, and podcasts on any device anywhere you like!</p>
            </div>
            <div class="price">
                <div class="circle">
                    <img src="img/note.png" alt="note, music">
                </div>
                <h3>Annual Plan</h3>
                <p class="dollars">$59.99/year</p>
                <p class="click">change</p>
            </div>
            <div class="blue-div">
                <p>Proceed to Payment</p>
            </div>
            <p class="cancel">Cancel Order</p>
        </div>
    </main>
    <footer></footer>
</body>
</html>
